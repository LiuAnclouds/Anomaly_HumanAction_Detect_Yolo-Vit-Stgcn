# 跌倒检测系统配置文件
# 在PyCharm中直接修改此文件即可，无需命令行参数

# ========== 模型路径配置 ==========
models:
  vitpose: "./checkpoints/vitpose-l-coco.engine"  # Windows路径使用正斜杠或双反斜杠
  yolo: "./checkpoints/yolov8s.engine"  # Windows路径使用正斜杠或双反斜杠
  stgcn: "./checkpoints/stgcn.onnx"

# ========== 输入输出配置 ==========
input:
  source: "video.avi"  # 摄像头ID (如 "0", "1") 或视频/图片路径（Windows路径使用正斜杠或双反斜杠）
              # 示例: "0" 或 "1" (摄像头), "F:/path/to/video.avi" (视频), "F:/path/to/image.jpg" (图片)
  mode: "auto"  # "auto" 自动识别, "video" 视频模式, "image" 图片模式, "camera" 摄像头模式
  rotate: 0  # 旋转角度: 0, 90, 180, 270

output:
  image_path: null  # 图片模式输出路径，null表示自动生成
  show_result: false  # 是否显示结果窗口（图片模式）
  window_name: "Fall Detection"  # 显示窗口名称

# ========== ID映射配置 ==========
# Person ID自动生成：Person1, Person2, Person3...（根据检测到的人数）
# 也可以手动映射到自定义名称
id_mapping:
  enabled: true  # 是否启用ID映射（true=自动生成Person1/Person2，false=显示ID0/ID1）
  auto_generate: true  # 自动生成Person1, Person2等（如果false，使用下面的mapping）
  mapping:  # track_id到名称的映射（仅在auto_generate=false时使用）
    0: "Person1"
    1: "Person2"
    2: "Person3"
  # 示例: 0: "张三", 1: "李四"

# ========== 类别映射配置 ==========
# STGCN输出的类别含义（class 0和1分别代表什么）
class_mapping:
  "0": "Fall"  # class 0 表示跌倒
  "1": "Normal"  # class 1 表示正常

# ========== 检测参数配置 ==========
detection:
  box_conf_threshold: 0.75  # YOLO检测置信度阈值
  pose_conf_threshold: 0.15  # 关键点置信度阈值
  dataset: "coco"  # 数据集类型: "coco" (17点) 或 "aic" (14点)
  min_box_size: 10  # 最小检测框尺寸（宽或高小于此值将被忽略）
  max_persons: 1  # 每帧最多处理多少人（按置信度排序），默认1人

# ========== 处理参数配置 ==========
processing:
  pose_interval: 1  # 每N帧进行一次姿态估计（1表示每帧都检测）
  window_size: 50  # STGCN窗口大小（帧数）
  prediction_interval: 1  # 每N帧进行一次跌倒预测
  buffer_multiplier: 2  # 缓冲区大小倍数（window_size * multiplier）
  min_frames_for_prediction: 30  # 最小预测帧数（小于此值不预测，0表示允许任何帧数预测）
  use_sliding_window: true  # 是否使用滑动窗口（true=只使用最新N帧，false=使用全部缓冲区）
  fall_confirm_frames: 8  # 二次确认：连续多少帧预测为跌倒才判定为跌倒（>=1）

# ========== 设备配置 ==========
device:
  use_cuda: true  # 是否使用CUDA（如果有GPU）
  stgcn_provider: "CPUExecutionProvider"  # STGCN推理提供者: "CPUExecutionProvider" 或 "CUDAExecutionProvider"

# ========== 绘制配置 ==========
drawing:
  # 检测框配置
  bbox:
    enabled: true  # 是否绘制检测框
    color: [255, 255, 0]  # BGR颜色 [B, G, R]
    thickness: 2  # 线条粗细
    show_score: true  # 是否显示置信度分数
    show_stgcn_result: true  # 是否在检测框旁边显示STGCN分类结果
    stgcn_result_offset: [5, 25]  # STGCN结果显示偏移 [x, y]（相对于检测框右上角）
  
  # 关键点配置
  keypoint:
    enabled: true  # 是否绘制关键点
    color: [0, 255, 0]  # BGR颜色 [B, G, R]
    radius: 4  # 关键点半径
    show_conf: true  # 是否显示置信度
    show_name: true  # 是否显示关键点名称（如nose, knee等，英文）
    conf_threshold: 0.4  # 置信度阈值（低于此值不绘制）
    name_offset: [5, -10]  # 名称标签偏移 [x, y]（相对于关键点位置，名称和conf会组合显示）
    conf_offset: [0, -5]  # 置信度标签偏移 [x, y]（仅在show_name=false时使用）
  
  # 骨架连线配置
  skeleton:
    enabled: true  # 是否绘制骨架连线
    color: [255, 200, 0]  # BGR颜色 [B, G, R]
    thickness: 2  # 线条粗细
  
  # 文字配置
  text:
    font: "FONT_HERSHEY_SIMPLEX"  # 字体类型
    scale: 0.5  # 字体大小（检测框标签）
    thickness: 2  # 字体粗细（检测框标签）
    color: [255, 255, 0]  # BGR颜色 [B, G, R]（检测框标签）

# ========== 结果显示配置 ==========
display:
  # 跌倒检测结果显示
  result:
    enabled: true  # 是否显示检测结果
    position: [20, 100]  # 起始位置 [x, y]
    line_spacing: 30  # 行间距（像素）
    font_scale: 0.7  # 字体大小
    thickness: 2  # 字体粗细
    # 颜色配置
    fall_color: [0, 0, 255]  # BGR颜色 [B, G, R]（跌倒-红色）
    normal_color: [0, 255, 0]  # BGR颜色 [B, G, R]（正常-绿色）
    show_prob: true  # 是否显示概率值
  
  # UI信息显示
  ui:
    enabled: true  # 是否显示UI信息
    fps:
      enabled: true
      position: [20, 40]
      font_scale: 1.0
      thickness: 2
      color: [0, 255, 0]  # BGR颜色 [B, G, R]
    frame_count:
      enabled: true
      position: [20, 70]
      font_scale: 0.7
      thickness: 2
      color: [255, 255, 255]  # BGR颜色 [B, G, R]
    skip_pose:
      enabled: true
      position: [200, 40]
      font_scale: 0.7
      thickness: 2
      color: [200, 200, 200]  # BGR颜色 [B, G, R]
    buffer_info:
      enabled: true
      position: [20, null]  # null表示底部（height - 20）
      font_scale: 0.5
      thickness: 1
      color: [200, 200, 200]  # BGR颜色 [B, G, R]
